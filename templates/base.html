<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>{% block title %}三國群英活動預測{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1f29;
    --panel-2: #232a37;
    --border: #2c3445;
    --text: #e6e9ef;
    --muted: #8a93a6;
    --accent: #f0c873;
    --accent-2: #4fb3ff;
    --good: #4ade80;
    --warn: #fb923c;
    --bad: #f87171;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: "Segoe UI", "Microsoft JhengHei", -apple-system, sans-serif;
         background: var(--bg); color: var(--text); line-height:1.55; }
  header { background: linear-gradient(90deg,#1a1f29,#2a2317);
           padding: 18px 28px; display:flex; gap: 24px; align-items:center;
           border-bottom: 1px solid var(--border); }
  header h1 { margin:0; font-size: 18px; color: var(--accent); }
  header nav a { color: var(--text); text-decoration: none; margin-right: 18px;
                 padding: 6px 10px; border-radius: 6px; }
  header nav a:hover { background: var(--panel-2); color: var(--accent); }
  main { max-width: 1200px; margin: 0 auto; padding: 24px 28px 80px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
          padding: 18px 22px; margin-bottom: 18px; }
  .card h2 { margin: 0 0 12px; font-size: 16px; color: var(--accent); border-bottom:1px solid var(--border);
             padding-bottom: 8px; }
  .grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(320px,1fr)); }
  .pill { display:inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px;
          border:1px solid var(--border); color: var(--muted); margin-right:6px; }
  .pill.good { color: var(--good); border-color:#1f5a3a; background:#0f2a1e; }
  .pill.warn { color: var(--warn); border-color:#5a3a1f; background:#2a1d10; }
  .pill.bad  { color: var(--bad); border-color:#5a1f1f; background:#2a1010; }
  table { width:100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { text-align: left; color: var(--muted); font-weight: 500; }
  tr:hover td { background: var(--panel-2); }
  a { color: var(--accent-2); }
  a:hover { color: var(--accent); }
  .muted { color: var(--muted); font-size: 13px; }
  .bar { height: 8px; border-radius: 4px; background: var(--border); overflow:hidden; margin-top:4px; }
  .bar > span { display:block; height:100%; background: linear-gradient(90deg,var(--accent),#ff9a3c); }
  .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .toolbar input, .toolbar select {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 6px; }
  .toolbar button { background: var(--accent); color: #111; border: none;
                    padding: 6px 14px; border-radius: 6px; cursor: pointer; }
  .kpi { display:flex; gap:24px; flex-wrap:wrap; }
  .kpi > div { background: var(--panel-2); padding: 12px 18px; border-radius: 8px;
               border:1px solid var(--border); min-width: 140px; }
  .kpi b { font-size: 22px; color: var(--accent); display:block; }
  .kpi span { color: var(--muted); font-size: 12px; }
  pre { background: var(--panel-2); padding: 10px; border-radius: 6px; overflow:auto;
        font-size: 12px; }
  details > summary { cursor: pointer; color: var(--accent-2); }
</style>
</head>
<body>
<header>
  <h1>三國群英 Online · 活動預測</h1>
  <nav>
    <a href="/">下月預測</a>
    <a href="/daily">📋 每日任務</a>
    <a href="/dress-strategy">⚔ 扮裝加持</a>
    <a href="/lootbox">🎁 福袋分析</a>
    <a href="/timeline">歷史時間軸</a>
    <a href="/activities">活動字典</a>
    <a href="/recurring">🔁 循環統計</a>
    <a href="/accuracy">🎯 預測準度</a>
    <a href="/levels">⚔ 戰技精隨&角色升級經驗表</a>
    <a href="/recharge">儲值贈品</a>
    <a href="/feedback" style="border:1px solid var(--accent);">📮 意見回饋</a>
  </nav>
  <span class="muted" style="margin-left:auto;">資料源：kh1.uj.com.tw</span>
</header>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
