name: Keep Render service warm

# ⚠️ AUTOMATIC SCHEDULE DISABLED (2026-05-27)
# GitHub Actions cron proved unreliable for keep-warm: on a low-traffic repo
# the '*/10' schedule actually fired only every 1-4 HOURS, so Render still
# spun down (observed 42-sec cold starts).  GitHub explicitly deprioritises
# frequent scheduled workflows.  Operator chose to accept cold starts rather
# than add an external uptime monitor.
#
# To re-enable keep-warm later, the reliable path is an EXTERNAL pinger
# (cron-job.org / UptimeRobot) hitting /healthz every ~10 min — NOT this cron.
# This workflow is kept for manual on-demand pings only.

on:
  workflow_dispatch: {}          # manual trigger only — no automatic schedule

# We never need more than one ping in flight; cancel an older one if a new tick fires.
concurrency:
  group: keepalive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping kh1-predictor /healthz
        run: |
          set -eu
          URL="https://kh1-predictor.onrender.com/healthz"
          echo "GET $URL"
          # -f fails on HTTP >=400; -m 90 covers cold-start (~30-60s on Render free)
          curl -fsS -m 90 "$URL" || {
            echo "ping failed, retrying once after 30s…"
            sleep 30
            curl -fsS -m 90 "$URL"
          }
